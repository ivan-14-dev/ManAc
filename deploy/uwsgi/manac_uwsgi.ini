[uwsgi]
# Django settings module
module = manac.wsgi:application

# Master process
master = true

# Maximum number of worker processes
processes = 4

# Socket configuration (Unix socket)
socket = /run/uwsgi/manac.sock

# Socket permissions
chmod-socket = 660

# Vacuum socket on exit
vacuum = true

# Die on term
die-on-term = true

# Virtual environment (adjust path as needed)
# venv = /path/to/venv

# Static files
static-map = /static=/media/eye-of-god/IVAN/script/common/Mobile/Managements/ManAc/django_backend/static
static-map = /media=/media/eye-of-god/IVAN/script/common/Mobile/Managements/ManAc/django_backend/media

# Enable harakiri (request timeout)
harakiri = 60

# Enable lazy apps
lazy-apps = true

# Post buffering
post-buffering = 8192

# Buffer size
buffer-size = 32768

# Thunder lock
thunder-lock = true

# Exceptions propagation
python-autoreload = 1
