# Nginx configuration for ManAC Backend (Django) with uWSGI
# Domain: http://manac_backend.ictu.loc

server {
    listen 80;
    server_name manac_backend.ictu.loc;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # uWSGI socket configuration
    location / {
        include uwsgi_params;
        uwsgi_pass unix:/run/uwsgi/manac.sock;
        uwsgi_param Host $host;
        uwsgi_param X-Real-IP $remote_addr;
        uwsgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
        uwsgi_param X-Forwarded-Proto $scheme;
        
        # Timeouts
        uwsgi_read_timeout 60s;
        uwsgi_send_timeout 60s;
    }

    # Media files
    location /media/ {
        alias /media/eye-of-god/IVAN/script/common/Mobile/Managements/ManAc/django_backend/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static files
    location /static/ {
        alias /media/eye-of-god/IVAN/script/common/Mobile/Managements/ManAc/django_backend/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
